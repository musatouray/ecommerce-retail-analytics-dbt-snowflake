name: 'ecommerce_retail_analytics'
version: '1.0.0'

profile: 'ecommerce_retail_analytics'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Customer segmentation thresholds
  customer_high_value_threshold: 500
  customer_medium_value_threshold: 100
  customer_promoter_threshold: 4.5
  customer_neutral_threshold: 3.0
  customer_active_days_threshold: 180

models:
  ecommerce_retail_analytics:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
    