name: 'ecommerce_retail_analytics'
version: '1.0.0'

profile: 'ecommerce_retail_analytics'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  active_days_threshold: 180
  
  # Customer segmentation thresholds
  customer_high_value_threshold: 500
  customer_medium_value_threshold: 100
  customer_promoter_threshold: 4.5
  customer_neutral_threshold: 3.0

  # Seller/Product segmentation thresholds
  platinum_value_threshold: 10000
  gold_value_threshold: 1000
  silver_value_threshold: 100

  # Market basket analysis thresholds
  market_basket_min_pair_count: 5

models:
  ecommerce_retail_analytics:
    # MEDALLION ARCHITECTURE:
    # - Staging (Silver) always goes to DEV database (shared across environments)
    # - Intermediate + Marts (Gold) go to target database (DEV or PROD)
    staging:
      +database: ECOMMERCE_RETAIL_DB_DEV  # Silver layer always in DEV
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
