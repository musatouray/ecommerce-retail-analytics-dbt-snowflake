  # Core dimension models for customers, sellers, products, and dates. 
  # These tables are designed to be the foundation for all downstream marts and analyses, 
  # providing a single source of truth for key entities and their attributes. 
  #They include comprehensive data quality tests to ensure reliability and consistency across the analytics ecosystem.

version: 2

models:
  # Customers dimension model
  - name: dim_customers
    description: >
      Customer dimension table containing customer attributes, location,
      aggregated order metrics, and behavioral segmentation. Grain is one row
      per unique customer (customer_unique_id). Includes customers who have
      never placed an order (prospects).
    columns:
      - name: customer_key
        description: Surrogate key for the customer dimension, generated from customer_unique_id
        data_tests:
          - unique
          - not_null

      - name: customer_unique_id
        description: Natural key - unique customer identifier from source system
        data_tests:
          - unique
          - not_null

      - name: zip_code
        description: Customer's zip code (5-digit, zero-padded). Uses most recent address if customer has multiple orders.

      - name: city
        description: Customer's city name (title case). Uses most recent address if customer has multiple orders.

      - name: state
        description: Customer's state code (2-letter uppercase). Uses most recent address if customer has multiple orders.

      - name: first_order_date
        description: Date of the customer's first order. NULL for prospects.

      - name: last_order_date
        description: Date of the customer's most recent order. NULL for prospects.

      - name: total_orders
        description: Total number of orders placed by the customer. 0 for prospects.
        data_tests:
          - not_null

      - name: total_revenue
        description: Total payment value across all customer orders (BRL). 0 for prospects.
        data_tests:
          - not_null

      - name: average_order_value
        description: Average payment value per order (total_revenue / total_orders). NULL for prospects.

      - name: total_reviews
        description: Total number of reviews submitted by the customer across all orders. NULL for prospects.

      - name: average_rating
        description: >
          Weighted average review score across all customer reviews (1-5 scale).
          Computed as sum of all review scores / total review count, not average of order averages.
          NULL if customer has no reviews.

      - name: days_since_last_order
        description: Number of days between last order date and current date. NULL for prospects.

      - name: customer_tenure_days
        description: Number of days between first and last order. 0 for single-order customers, NULL for prospects.

      - name: customer_segment
        description: >
          Customer purchase behavior segment:
          - prospect: No orders placed
          - new: Exactly 1 order placed
          - returning: 2+ orders placed
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['prospect', 'new', 'returning']

      - name: customer_value_segment
        description: >
          Customer value segment based on total revenue. Thresholds configurable via dbt vars:
          - unknown: No orders (prospect)
          - high_value: Revenue >= $customer_high_value_threshold (default 500)
          - medium_value: Revenue >= $customer_medium_value_threshold (default 100)
          - low_value: Revenue < $customer_medium_value_threshold
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['unknown', 'high_value', 'medium_value', 'low_value']

      - name: customer_satisfaction_segment
        description: >
          Customer satisfaction segment based on average review rating. Thresholds configurable via dbt vars:
          - unknown: No reviews submitted
          - promoter: Average rating >= $customer_promoter_threshold (default 4.5)
          - neutral: Average rating >= $customer_neutral_threshold (default 3.0)
          - detractor: Average rating < $customer_neutral_threshold
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['unknown', 'promoter', 'neutral', 'detractor']

      - name: is_active
        description: >
          TRUE if customer's last order was within $customer_active_days_threshold days (default 180).
          FALSE otherwise, including prospects.
        data_tests:
          - not_null

      - name: created_at
        description: Timestamp when this record was created in the data warehouse
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when this record was last updated in the data warehouse
        data_tests:
          - not_null

  # Sellers dimension model
  - name: dim_sellers
    description: >
      Seller dimension table containing seller attributes, location,
      aggregated order metrics, delivery performance, and segmentation.
      Grain is one row per seller (seller_id). Includes sellers who have
      never completed an order.
    columns:
      - name: seller_key
        description: Surrogate key for the seller dimension, generated from seller_id
        data_tests:
          - unique
          - not_null

      - name: seller_id
        description: Natural key - unique seller identifier from source system
        data_tests:
          - unique
          - not_null

      - name: zip_code
        description: Seller's zip code (5-digit, zero-padded)

      - name: city
        description: Seller's city name (title case)

      - name: state
        description: Seller's state code (2-letter uppercase)

      - name: latitude
        description: Geographic latitude of seller location (from geolocation data)

      - name: longitude
        description: Geographic longitude of seller location (from geolocation data)

      - name: first_order_date
        description: Date of the seller's first order. NULL if no orders.

      - name: last_order_date
        description: Date of the seller's most recent order. NULL if no orders.

      - name: seller_tenure_days
        description: Number of days between first and last order. NULL if no orders.

      - name: days_since_last_sale
        description: Number of days between last order date and current date. NULL if no orders.

      - name: average_delivery_days
        description: >
          Average days from order purchase to customer delivery for delivered orders.
          Measures total customer wait time. NULL if no delivered orders.

      - name: average_shipping_transit_days
        description: >
          Average days from carrier pickup to customer delivery for delivered orders.
          Measures shipping transit time. NULL if no delivered orders.

      - name: average_fulfillment_days
        description: >
          Average days from order approval to customer delivery for delivered orders.
          Measures fulfillment efficiency. NULL if no delivered orders.

      - name: primary_product_category
        description: >
          The product category (English) with the most items sold by this seller.
          Ties broken by most recent order date, then alphabetically.
          'Unknown' if no category data available.
        data_tests:
          - not_null

      - name: is_active
        description: >
          TRUE if seller's last order was within $active_days_threshold days (default 180).
          NULL if seller has no orders.

      - name: total_orders
        description: Total number of distinct orders fulfilled by the seller. 0 if no orders.
        data_tests:
          - not_null

      - name: total_items_sold
        description: Total number of items sold by the seller across all orders. 0 if no orders.
        data_tests:
          - not_null

      - name: total_revenue
        description: Total revenue (price + freight) across all seller orders (BRL). 0 if no orders.
        data_tests:
          - not_null

      - name: successful_orders
        description: Number of items in orders with 'delivered' status. 0 if no delivered orders.
        data_tests:
          - not_null

      - name: successful_revenue
        description: Revenue from orders with 'delivered' status (BRL). 0 if no delivered orders.
        data_tests:
          - not_null

      - name: sale_success_rate
        description: >
          Percentage of orders successfully delivered (delivered orders / total orders * 100).
          0 if no orders.
        data_tests:
          - not_null

      - name: revenue_success_rate
        description: >
          Percentage of revenue from delivered orders (delivered revenue / total revenue * 100).
          0 if no orders.
        data_tests:
          - not_null

      - name: performance_segment
        description: >
          Seller performance segment based on total revenue. Thresholds configurable via dbt vars:
          - inactive: No orders
          - platinum: Revenue >= $seller_platinum_value_threshold (default 10000)
          - gold: Revenue >= $seller_gold_value_threshold (default 1000)
          - silver: Revenue >= $seller_silver_value_threshold (default 100)
          - bronze: Revenue < $seller_silver_value_threshold
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['inactive', 'platinum', 'gold', 'silver', 'bronze']

  # Dates dimension model
  - name: dim_dates
    description: >
      Date dimension table generated from the order date range in the source data.
      Contains date attributes for time-based analysis including fiscal periods,
      ISO week numbering, and relative offsets from current date.
    columns:
      - name: date_key
        description: Integer surrogate key in YYYYMMDD format (e.g., 20231225 for Dec 25, 2023)
        data_tests:
          - unique
          - not_null

      - name: date
        description: Calendar date (natural key)
        data_tests:
          - unique
          - not_null

      - name: year
        description: Calendar year (e.g., 2023)

      - name: iso_year
        description: ISO year for week-based calculations

      - name: iso_year_week
        description: ISO year and week in format YYYY-WNN (e.g., 2023-W52)

      - name: year_quarter
        description: Year and quarter in format YYYY-QN (e.g., 2023-Q4)

      - name: year_month
        description: Year and month in format YYYY-MM (e.g., 2023-12)

      - name: quarter_number
        description: Quarter number (1-4)

      - name: quarter_name
        description: Quarter name (Q1, Q2, Q3, Q4)

      - name: month
        description: Month number (1-12)

      - name: month_name
        description: Full month name (January, February, etc.)

      - name: month_year
        description: Month and year in format Mon-YYYY (e.g., Dec-2023)

      - name: week
        description: Week number of the year

      - name: year_week
        description: Week and year in format WW-YYYY

      - name: day
        description: Day of the month (1-31)

      - name: iso_day_of_week
        description: ISO day of week (1=Monday, 7=Sunday)

      - name: day_name
        description: Abbreviated day name (Mon, Tue, etc.)

      - name: day_of_week
        description: Snowflake day of week (0=Sunday, 6=Saturday)

      - name: is_weekend
        description: TRUE if Saturday or Sunday (Snowflake convention)

      - name: is_iso_weekend
        description: TRUE if Saturday or Sunday (ISO convention)

      - name: day_offset
        description: Days relative to current date (negative=past, 0=today, positive=future)

      - name: week_offset
        description: Weeks relative to current date

      - name: month_offset
        description: Months relative to current date

      - name: quarter_offset
        description: Quarters relative to current date

      - name: year_offset
        description: Years relative to current date

  # Products dimension model
  - name: dim_products
    description: >
      Product dimension table containing product attributes including
      category, physical dimensions, and content metadata.
      Grain is one row per product (product_id).
    columns:
      - name: product_key
        description: Surrogate key for the product dimension, generated from product_id
        data_tests:
          - unique
          - not_null

      - name: product_id
        description: Natural key - unique product identifier from source system
        data_tests:
          - unique
          - not_null

      - name: product_category
        description: Product category name in English (translated from Portuguese)

      - name: name_length
        description: Length of product name in characters

      - name: description_length
        description: Length of product description in characters

      - name: photos_qty
        description: Number of product photos

      - name: weight_g
        description: Product weight in grams

      - name: length_cm
        description: Product length in centimeters

      - name: height_cm
        description: Product height in centimeters

      - name: width_cm
        description: Product width in centimeters
