# Marketing fact models for category and geographic analytics.
# These tables provide aggregated views for marketing performance and regional analysis.

version: 2

models:
  # Category performance fact table
  - name: fct_category_performance
    description: >
      Category performance fact table aggregated by product category and month.
      Use this for category trends, product mix analysis, and merchandising insights.
      One row per product category per month.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_category
              - year_month
    columns:
      - name: product_category
        description: Product category name in English. NULL for products without translation.

      - name: year_month
        description: Year and month in YYYY-MM format
        data_tests:
          - not_null

      - name: month_date_key
        description: Foreign key to dim_dates for the first day of the month

      - name: total_items_sold
        description: Total number of items sold in this category for the month
        data_tests:
          - not_null

      - name: total_orders
        description: Total number of distinct orders containing this category
        data_tests:
          - not_null

      - name: total_price
        description: Sum of item prices for this category (BRL)
        data_tests:
          - not_null

      - name: total_freight
        description: Sum of freight costs for this category (BRL)
        data_tests:
          - not_null

      - name: total_revenue
        description: Total revenue including freight (total_price + total_freight)
        data_tests:
          - not_null

      - name: average_item_value
        description: Average value per item (price + freight)
        data_tests:
          - not_null

      - name: created_at
        description: Timestamp when this record was created in the data warehouse
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when this record was last updated in the data warehouse
        data_tests:
          - not_null

  # Geographic performance fact table
  - name: fct_geo_performance
    description: >
      Geographic performance fact table aggregated by customer state and month.
      Use this for regional trends, market analysis, and geographic expansion insights.
      One row per state per month.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - state
              - year_month
    columns:
      - name: state
        description: Customer state code (2-letter uppercase)
        data_tests:
          - not_null

      - name: year_month
        description: Year and month in YYYY-MM format
        data_tests:
          - not_null

      - name: month_date_key
        description: Foreign key to dim_dates for the first day of the month

      - name: total_orders
        description: Total number of distinct orders from this state
        data_tests:
          - not_null

      - name: delivered_orders
        description: Number of orders with 'delivered' status
        data_tests:
          - not_null

      - name: canceled_orders
        description: Number of orders with 'canceled' status
        data_tests:
          - not_null

      - name: unique_cities
        description: Number of distinct cities with orders in this state
        data_tests:
          - not_null

      - name: total_price
        description: Sum of item prices for this state (BRL)
        data_tests:
          - not_null

      - name: total_freight
        description: Sum of freight costs for this state (BRL)
        data_tests:
          - not_null

      - name: total_revenue
        description: Total revenue including freight (total_price + total_freight)
        data_tests:
          - not_null

      - name: total_payment_value
        description: Sum of payment values for this state (BRL)

      - name: average_order_value
        description: Average payment value per order (BRL)

      - name: total_reviews
        description: Total number of reviews from this state

      - name: average_review_score
        description: Average review score for this state (1-5 scale)

      - name: created_at
        description: Timestamp when this record was created in the data warehouse
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when this record was last updated in the data warehouse
        data_tests:
          - not_null
