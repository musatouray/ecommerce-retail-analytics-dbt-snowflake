# Customer analytics models for segmentation, retention, and lifetime value analysis.
# These models power marketing campaigns, churn prevention, and customer insights.

version: 2

models:
  - name: fct_rfm_segments
    description: >
      RFM segmentation fact table scoring customers on Recency, Frequency, and Monetary value.
      Each customer is assigned a 1-5 score for each dimension (5 = best) and classified into
      actionable segments for targeted marketing campaigns.
    columns:
      - name: rfm_segment_key
        description: Surrogate key for the RFM segment record
        data_tests:
          - unique
          - not_null

      - name: customer_unique_id
        description: Unique customer identifier (grain of the table)
        data_tests:
          - unique
          - not_null

      - name: recency
        description: Days since customer's last purchase (lower = better)
        data_tests:
          - not_null

      - name: frequency
        description: Total number of orders placed by the customer
        data_tests:
          - not_null

      - name: monetary
        description: Total revenue generated by the customer
        data_tests:
          - not_null

      - name: r_score
        description: Recency score from 1-5 (5 = most recent)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

      - name: f_score
        description: Frequency score from 1-5 (5 = most frequent)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

      - name: m_score
        description: Monetary score from 1-5 (5 = highest spend)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

      - name: combined_score
        description: Concatenated RFM score (e.g., '555' for best customers)
        data_tests:
          - not_null

      - name: rfm_segment
        description: Business segment classification based on RFM scores
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Champions
                  - Cant Lose Them
                  - Loyal
                  - Potential Loyalists
                  - New Customers
                  - At Risk
                  - Hibernating
                  - Need Attention

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

  - name: fct_cohort_retention
    description: >
      Cohort retention fact table tracking customer retention by acquisition month.
      Each row represents a cohort-period combination showing how many customers
      from each acquisition cohort were active in subsequent months.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cohort_month
              - period_number
    columns:
      - name: cohort_retention_key
        description: Surrogate key for the cohort retention record
        data_tests:
          - unique
          - not_null

      - name: cohort_key
        description: Foreign key to dim_cohorts
        data_tests:
          - not_null

      - name: cohort_month
        description: Month when customers in this cohort made their first purchase
        data_tests:
          - not_null

      - name: period_number
        description: Number of months since cohort formation (0 = first month)
        data_tests:
          - not_null

      - name: active_customers
        description: Count of customers from this cohort who placed an order in this period
        data_tests:
          - not_null

      - name: cohort_size
        description: Total customers in this cohort (used for retention % calculation)
        data_tests:
          - not_null

      - name: retention_rate
        description: Percentage of cohort still active in this period (0-100)
        data_tests:
          - not_null

      - name: churn_rate
        description: Percentage of cohort not active in this period (100 - retention_rate)
        data_tests:
          - not_null

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

seeds:
  - name: rfm_segment_definitions
    description: >
      Reference table defining RFM segments with descriptions and recommended actions.
      Join to fct_rfm_segments for Power BI tooltips and segment explanations.
    columns:
      - name: rfm_segment
        description: Segment name matching fct_rfm_segments.rfm_segment
        data_tests:
          - unique
          - not_null

      - name: segment_description
        description: Human-readable description of the segment

      - name: recommended_action
        description: Suggested marketing action for this segment

      - name: priority
        description: Action priority (1 = highest)
