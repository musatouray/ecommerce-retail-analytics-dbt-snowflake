# Finance fact models for revenue and payment analytics.
# These tables provide aggregated views for financial reporting and analysis.

version: 2

models:
  # Daily revenue fact table
  - name: fct_daily_revenue
    description: >
      Daily revenue fact table aggregated at date grain.
      Use this for revenue trends, daily performance, and time-series analysis.
      One row per day with orders.
    columns:
      - name: date_key
        description: Foreign key to dim_dates for the order date
        data_tests:
          - unique
          - not_null

      - name: total_orders
        description: Total number of distinct orders placed on this date
        data_tests:
          - not_null

      - name: delivered_orders
        description: Number of orders with 'delivered' status
        data_tests:
          - not_null

      - name: canceled_orders
        description: Number of orders with 'canceled' status
        data_tests:
          - not_null

      - name: total_price
        description: Sum of item prices for all orders on this date (BRL)
        data_tests:
          - not_null

      - name: total_freight
        description: Sum of freight costs for all orders on this date (BRL)
        data_tests:
          - not_null

      - name: gross_revenue
        description: Total revenue including freight (total_price + total_freight)
        data_tests:
          - not_null

      - name: total_payment_value
        description: Sum of payment values collected on this date (BRL)

      - name: average_order_value
        description: Average payment value per order on this date (BRL)

      - name: total_reviews
        description: Total number of reviews for orders on this date

      - name: average_review_score
        description: Average review score for orders on this date (1-5 scale)

      - name: created_at
        description: Timestamp when this record was created in the data warehouse
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when this record was last updated in the data warehouse
        data_tests:
          - not_null

  # Payment analysis fact table
  - name: fct_payment_analysis
    description: >
      Payment analysis fact table aggregated by payment type and month.
      Use this for payment method performance, installment analysis, and payment trends.
      One row per payment type per month.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - payment_type
              - year_month
    columns:
      - name: payment_type
        description: Payment method (credit_card, boleto, voucher, debit_card, not_defined)
        data_tests:
          - not_null

      - name: year_month
        description: Year and month in YYYY-MM format
        data_tests:
          - not_null

      - name: month_date_key
        description: Foreign key to dim_dates for the first day of the month

      - name: total_transactions
        description: Total number of payment transactions
        data_tests:
          - not_null

      - name: total_orders
        description: Total number of distinct orders using this payment type
        data_tests:
          - not_null

      - name: total_payment_value
        description: Sum of payment values for this payment type and month (BRL)
        data_tests:
          - not_null

      - name: average_payment_value
        description: Average payment value per transaction (BRL)
        data_tests:
          - not_null

      - name: average_installments
        description: Average number of installments used
        data_tests:
          - not_null

      - name: max_installments
        description: Maximum number of installments used in any transaction
        data_tests:
          - not_null

      - name: revenue_per_order
        description: Average revenue per order (total_payment_value / total_orders)

      - name: created_at
        description: Timestamp when this record was created in the data warehouse
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when this record was last updated in the data warehouse
        data_tests:
          - not_null
