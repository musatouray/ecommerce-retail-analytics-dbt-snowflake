# Source generation for raw data tables
# Data integrity tests: Add generic tests like not null, unique, accepted values, relationships
version: 2

sources:
  - name: raw
    database: "{{ target.database }}"
    schema: "{{ target.schema }}"
    description: "Source definitions for staging models in ecommerce_retail_analytics project."

    tables:
      - name: customers
        description: ""
        columns:
          - name: customer_id
            data_type: varchar
            description: "primary key for customers table"
            data_tests:
              - not_null
              - unique
          - name: customer_unique_id
            data_type: varchar
            description: ""
          - name: customer_zip_code_prefix
            data_type: number
            description: ""
          - name: customer_city
