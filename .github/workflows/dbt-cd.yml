# dbt Continuous Deployment (CD) Pipeline
# Runs on merge to main branch
# Deploys to production Snowflake environment

name: dbt CD

on:
  push:
    branches: [main]
    paths:
      - 'ecommerce-retail-analytics/dbt/**'
      - '.github/workflows/dbt-cd.yml'

  # Allow manual trigger for rollbacks or re-deployments
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run with --full-refresh flag'
        required: false
        default: 'false'
        type: boolean

env:
  DBT_PROJECT_DIR: ecommerce-retail-analytics/dbt

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-snowflake==1.7.0
          dbt --version

      # Write private key to file (required for Snowflake keypair auth)
      - name: Setup Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Create profiles.yml for Production
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ecommerce_retail_analytics:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                database: "${{ secrets.SNOWFLAKE_DATABASE }}"
                schema: RAW
                private_key_path: /tmp/rsa_key.p8
                private_key_passphrase: "${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}"
                threads: 4
          EOF

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: Verify dbt connection
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt debug

      # Run dbt build (run + test)
      - name: dbt build
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          if [ "${{ github.event.inputs.full_refresh }}" == "true" ]; then
            echo "Running dbt build with --full-refresh"
            dbt build --full-refresh
          else
            echo "Running dbt build"
            dbt build
          fi

      # Generate documentation
      - name: Generate dbt docs
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt docs generate

      # Save production manifest for Slim CI comparisons
      - name: Upload production manifest
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: ${{ env.DBT_PROJECT_DIR }}/target/manifest.json
          retention-days: 90

      # Upload docs artifact
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: |
            ${{ env.DBT_PROJECT_DIR }}/target/catalog.json
            ${{ env.DBT_PROJECT_DIR }}/target/manifest.json
            ${{ env.DBT_PROJECT_DIR }}/target/index.html

      # Cleanup private key
      - name: Cleanup
        if: always()
        run: rm -f /tmp/rsa_key.p8

  # Notify on deployment
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
          else
            echo "❌ Production deployment failed!"
            echo "Check the workflow logs for details."
          fi
