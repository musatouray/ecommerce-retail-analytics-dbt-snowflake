# dbt Continuous Deployment (CD) Pipeline
# Runs on merge to main branch
# Deploys to PRODUCTION Snowflake database
#
# MEDALLION ARCHITECTURE:
#   Bronze + Silver: ECOMMERCE_RETAIL_DB_DEV.RAW + STAGING (shared source)
#   Gold (Prod):     ECOMMERCE_RETAIL_DB_PROD.INTERMEDIATE + MARTS
#
# Only merged code reaches production - protected by branch rules

name: dbt CD

on:
  push:
    branches: [main]
    paths:
      - 'ecommerce-retail-analytics/dbt/**'
      - '.github/workflows/dbt-cd.yml'

  # Allow manual trigger for rollbacks or re-deployments
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run with --full-refresh flag'
        required: false
        default: 'false'
        type: boolean

env:
  DBT_PROJECT_PATH: ecommerce-retail-analytics/dbt
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core==1.11.8 dbt-snowflake==1.11.4
          dbt --version

      # Write private key to file (required for Snowflake keypair auth)
      - name: Setup Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Validate Snowflake account format
        run: |
          ACCOUNT="$(echo '${{ secrets.SNOWFLAKE_ACCOUNT }}' | xargs)"
          echo "Using Snowflake account identifier: $ACCOUNT"
          if echo "$ACCOUNT" | grep -Eq '^https?://|snowflakecomputing\.com'; then
            echo "ERROR: SNOWFLAKE_ACCOUNT must be an account identifier (e.g., xy12345.us-east-1), not a URL or hostname"
            exit 1
          fi

      # PRODUCTION profile - uses ECOMMERCE_RETAIL_DB_PROD
      - name: Create profiles.yml for Production
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_retail_analytics:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "$(echo '${{ secrets.SNOWFLAKE_ACCOUNT }}' | xargs)"
                user: "$(echo '${{ secrets.SNOWFLAKE_USER }}' | xargs)"
                role: "$(echo '${{ secrets.SNOWFLAKE_ROLE }}' | xargs)"
                warehouse: "$(echo '${{ secrets.SNOWFLAKE_WAREHOUSE }}' | xargs)"
                database: "$(echo '${{ secrets.SNOWFLAKE_DATABASE_PROD }}' | xargs)"
                schema: MARTS
                private_key_path: /tmp/rsa_key.p8
                private_key_passphrase: "$(echo '${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}' | xargs)"
                threads: 4
          EOF

      - name: Install dbt packages
        run: |
          cd ${{ env.DBT_PROJECT_PATH }}
          dbt deps

      - name: Verify dbt connection
        run: |
          cd ${{ env.DBT_PROJECT_PATH }}
          dbt debug

      # Run dbt build (run + test)
      - name: dbt build
        run: |
          cd ${{ env.DBT_PROJECT_PATH }}
          if [ "${{ github.event.inputs.full_refresh }}" == "true" ]; then
            echo "Running dbt build with --full-refresh"
            dbt build --full-refresh
          else
            echo "Running dbt build"
            dbt build
          fi

      # Generate documentation
      - name: Generate dbt docs
        run: |
          cd ${{ env.DBT_PROJECT_PATH }}
          dbt docs generate

      # Save production manifest for Slim CI comparisons
      - name: Upload production manifest
        uses: actions/upload-artifact@v5
        with:
          name: prod-manifest
          path: ${{ env.DBT_PROJECT_PATH }}/target/manifest.json
          retention-days: 90

      # Upload docs artifact
      - name: Upload docs artifact
        uses: actions/upload-artifact@v5
        with:
          name: dbt-docs
          path: |
            ${{ env.DBT_PROJECT_PATH }}/target/catalog.json
            ${{ env.DBT_PROJECT_PATH }}/target/manifest.json
            ${{ env.DBT_PROJECT_PATH }}/target/index.html

      # Cleanup private key
      - name: Cleanup
        if: always()
        run: rm -f /tmp/rsa_key.p8

  # Notify on deployment
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "Database: ECOMMERCE_RETAIL_DB_PROD"
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
          else
            echo "❌ Production deployment failed!"
            echo "Check the workflow logs for details."
          fi
